name: Validate portfolio content

on:
  pull_request:
    paths:
      - 'content/**'
      - 'assets/**'
      - 'schemas/**'
      - 'scripts/**'
      - 'proposals/**'
      - 'evidence-packets/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run validate
      - run: npm run validate:proposals
      - run: npm run compile
      - name: Require committed compiled output
        run: git diff --exit-code -- dist
